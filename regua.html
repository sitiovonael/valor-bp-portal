<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM · Régua de Relacionamento</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f2f5;color:#1a1a2e;min-height:100vh}
#app{display:flex;min-height:100vh}
.loading-screen{position:fixed;inset:0;background:#1a1a2e;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:16px}
.loading-screen h2{color:#fff;font-size:18px}
.loading-screen p{color:#8888aa;font-size:13px}
.spinner{width:40px;height:40px;border:3px solid #2d2d4e;border-top-color:#e8a000;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#27ae60;display:inline-block;margin-right:6px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.sidebar{width:220px;background:#1a1a2e;color:#fff;display:flex;flex-direction:column;flex-shrink:0}
.sidebar-logo{padding:22px 20px 14px;border-bottom:1px solid #2d2d4e}
.sidebar-logo h2{font-size:14px;font-weight:700;color:#fff;line-height:1.3}
.sidebar-logo p{font-size:11px;color:#8888aa;margin-top:3px}
.portal-btn{display:inline-flex;align-items:center;gap:5px;color:#8888aa;text-decoration:none;font-size:11px;margin-top:10px;padding:4px 10px;border:1px solid #2d2d4e;border-radius:14px;transition:.15s}
.portal-btn:hover{color:#e8a000;border-color:#e8a000}
.sidebar-nav{flex:1;padding:10px 0}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;font-size:13px;color:#b0b0cc;border-left:3px solid transparent;transition:all .15s}
.nav-item:hover{background:#2d2d4e;color:#fff}
.nav-item.active{background:#2d2d4e;color:#fff;border-left-color:#e8a000}
.nav-icon{font-size:15px;width:18px;text-align:center}
.notif-dot{display:inline-block;background:#c0392b;color:#fff;font-size:10px;font-weight:700;border-radius:10px;padding:1px 6px;margin-left:auto}
.sidebar-footer{padding:14px 20px;border-top:1px solid #2d2d4e;font-size:11px;color:#5555aa}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:#fff;border-bottom:1px solid #e0e0e0;padding:10px 22px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.topbar-title{font-size:15px;font-weight:700}
.bp-tabs{display:flex;gap:6px;flex-wrap:wrap}
.bp-tab{padding:5px 13px;border-radius:20px;border:1px solid #ddd;font-size:12px;cursor:pointer;background:#fff;transition:all .15s}
.bp-tab:hover{border-color:#e8a000;color:#e8a000}
.bp-tab.active{background:#e8a000;border-color:#e8a000;color:#fff;font-weight:700}
.bp-alerta{display:inline-block;background:#c0392b;color:#fff;font-size:9px;font-weight:700;border-radius:8px;padding:0 4px;margin-left:4px;vertical-align:middle}
.content{flex:1;overflow-y:auto;padding:20px}
/* Cards */
.cards-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.card{background:#fff;border-radius:10px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.card-label{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:.5px}
.card-value{font-size:26px;font-weight:700;margin-top:3px}
.card-sub{font-size:11px;color:#aaa;margin-top:1px}
.card.urgent .card-value{color:#c0392b}
.card.overdue .card-value{color:#e67e22}
.card.ok .card-value{color:#27ae60}
.card.total .card-value{color:#2980b9}
/* Meta Mensal */
.meta-box{background:#fff;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.06);padding:20px;margin-bottom:20px}
.meta-top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap}
.meta-left{flex:1;min-width:180px}
.meta-title{font-size:13px;font-weight:700;margin-bottom:4px}
.meta-subtitle{font-size:11px;color:#888;margin-bottom:14px}
.meta-pct-wrap{display:flex;align-items:flex-end;gap:8px;margin-bottom:8px}
.meta-pct{font-size:52px;font-weight:800;line-height:1}
.meta-pct-label{font-size:13px;color:#888;margin-bottom:8px}
.meta-bar{height:10px;background:#eee;border-radius:5px;overflow:hidden;margin-bottom:6px}
.meta-bar-fill{height:100%;border-radius:5px;transition:width .6s}
.meta-counts{font-size:11px;color:#888}
.meta-counts b{color:#333;font-weight:700}
.c-ok{color:#27ae60} .c-med{color:#e67e22} .c-low{color:#c0392b}
.f-ok{background:linear-gradient(90deg,#27ae60,#2ecc71)}
.f-med{background:linear-gradient(90deg,#e67e22,#f39c12)}
.f-low{background:linear-gradient(90deg,#c0392b,#e74c3c)}
/* BP cards na meta */
.meta-bps{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:16px;padding-top:16px;border-top:1px solid #f0f0f0}
.meta-bp{background:#f8f9fa;border-radius:8px;padding:14px}
.meta-bp-name{font-size:10px;font-weight:700;color:#888;text-transform:uppercase;margin-bottom:6px}
.meta-bp-pct{font-size:28px;font-weight:800;line-height:1;margin-bottom:6px}
.meta-bp-bar{height:6px;background:#e0e0e0;border-radius:3px;overflow:hidden;margin-bottom:5px}
.meta-bp-fill{height:100%;border-radius:3px}
.meta-bp-counts{font-size:10px;color:#888}
/* Histórico */
.meta-hist{margin-top:16px;padding-top:16px;border-top:1px solid #f0f0f0}
.meta-hist-title{font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.meta-hist-row{display:flex;align-items:center;gap:10px;margin-bottom:7px}
.meta-hist-mes{width:75px;font-size:12px;color:#555;font-weight:600}
.meta-hist-bar{flex:1;height:7px;background:#eee;border-radius:4px;overflow:hidden}
.meta-hist-fill{height:100%;border-radius:4px}
.meta-hist-pct{width:36px;text-align:right;font-size:11px;font-weight:700}
.meta-hist-cnt{font-size:10px;color:#aaa;width:55px}
/* Section / Table */
.section-card{background:#fff;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:20px}
.section-header{padding:14px 18px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.section-title{font-size:13px;font-weight:700}
.filters{display:flex;gap:7px;flex-wrap:wrap}
select,input[type=text],input[type=date],textarea{border:1px solid #ddd;border-radius:6px;padding:6px 9px;font-size:12px;font-family:inherit;outline:none;transition:border .15s;background:#fff}
select:focus,input:focus,textarea:focus{border-color:#e8a000}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#f8f9fa;font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:#666;padding:9px 12px;text-align:left;border-bottom:1px solid #eee;white-space:nowrap}
td{padding:9px 12px;border-bottom:1px solid #f5f5f5;vertical-align:middle}
tr:hover td{background:#fafafa}
.nome-cell{font-weight:600;font-size:12px}
.badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700}
.bp-badge{background:#eee;color:#555}
.status-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700}
.s-urgente{background:#fde8e8;color:#c0392b}
.s-vencido{background:#fef3e2;color:#e67e22}
.s-emdia{background:#e8f8f0;color:#27ae60}
.cargo-gestor{color:#8e44ad;font-weight:600;font-size:12px}
.cargo-lider{color:#2980b9;font-weight:600;font-size:12px}
.cargo-assessor{color:#555;font-size:12px}
.u-bhz{background:#e8f4fd;color:#1a6fa0} .u-rjo{background:#fef0e8;color:#c0562b} .u-bru{background:#e8fdf0;color:#1a8040}
.u-sp{background:#f0e8fd;color:#6a1aad} .u-bsb{background:#fde8f5;color:#b01a7a} .u-gyn{background:#fdfae8;color:#9a7a00}
.u-vix{background:#e8fdfa;color:#1a9080} .u-nex{background:#f5e8fd;color:#7a1ab0} .u-lin{background:#fde8e8;color:#b01a1a} .u-cac{background:#e8f0fd;color:#1a3ab0}
.btn{padding:6px 13px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-family:inherit;font-weight:600;transition:all .15s}
.btn-primary{background:#e8a000;color:#fff} .btn-primary:hover{background:#c98900} .btn-primary:disabled{background:#ccc;cursor:not-allowed}
.btn-sm{padding:3px 9px;font-size:11px} .btn-ghost{background:transparent;border:1px solid #ddd;color:#555} .btn-ghost:hover{background:#f5f5f5}
.progress-wrap{display:flex;align-items:center;gap:6px}
.progress-bar{flex:1;height:5px;background:#eee;border-radius:3px;overflow:hidden;min-width:50px}
.progress-fill{height:100%;border-radius:3px;background:#27ae60;transition:width .3s}
.progress-fill.warn{background:#e67e22} .progress-fill.danger{background:#c0392b}
.progress-pct{font-size:10px;font-weight:700;color:#666;min-width:28px}
.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;padding:18px}
.form-grid.cols3{grid-template-columns:repeat(3,1fr)}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:11px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:.3px}
.form-group.full{grid-column:1/-1}
.form-actions{padding:0 18px 18px;display:flex;gap:8px}
.alert{padding:10px 14px;border-radius:8px;font-size:12px;margin:14px 18px 0}
.alert-success{background:#e8f8f0;color:#1a6a3a;border:1px solid #b0dfbf}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px}
.modal{background:#fff;border-radius:12px;width:100%;max-width:580px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.modal-header{padding:18px;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:1}
.modal-header h3{font-size:14px;font-weight:700}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:#888;line-height:1}
.modal-body{padding:18px}
.hist-item{padding:10px 13px;border-left:3px solid #e8a000;background:#fffdf5;border-radius:0 6px 6px 0;margin-bottom:8px}
.hist-item-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.hist-nome{font-weight:700;font-size:12px}
.hist-date{font-size:10px;color:#888;white-space:nowrap}
.hist-meta{display:flex;gap:6px;margin-top:5px;flex-wrap:wrap}
.hist-tag{background:#f0f0f0;color:#555;font-size:10px;padding:1px 6px;border-radius:4px}
.hist-comment{font-size:11px;color:#555;margin-top:5px;font-style:italic}
.empty{text-align:center;padding:32px;color:#aaa;font-size:13px}
.risco-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#c0392b;margin-right:4px;vertical-align:middle}
.count-info{font-size:11px;color:#888}
.notif-panel{background:#1a1a2e;color:#fff;border-radius:10px;padding:16px;margin-bottom:20px}
.notif-panel-title{font-size:12px;font-weight:700;color:#e8a000;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.notif-item{display:flex;align-items:center;padding:7px 10px;background:#2d2d4e;border-radius:6px;margin-bottom:6px;font-size:11px;gap:8px}
.notif-item-nome{font-weight:600;flex:1}
.notif-item-days{padding:2px 7px;border-radius:8px;font-size:10px;font-weight:700}
.days-urgente{background:#fde8e8;color:#c0392b} .days-vencido{background:#fef3e2;color:#e67e22}
@media(max-width:900px){.cards-row{grid-template-columns:repeat(2,1fr)}.form-grid.cols3{grid-template-columns:repeat(2,1fr)}.meta-bps{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="app">
  <div v-if="loading" class="loading-screen">
    <div class="spinner"></div>
    <h2>Carregando CRM...</h2>
    <p>Conectando ao banco de dados</p>
  </div>

  <template v-else>
  <aside class="sidebar">
    <div class="sidebar-logo">
      <h2>Régua de<br>Relacionamento</h2>
      <p>Comercial · {{ anoAtual }}</p>
      <a href="index.html" class="portal-btn">&larr; Portal</a>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-item" :class="{active:view==='dashboard'}" @click="view='dashboard'">
        <span class="nav-icon">📊</span> Dashboard
        <span v-if="totalAlerta>0" class="notif-dot">{{ totalAlerta }}</span>
      </div>
      <div class="nav-item" :class="{active:view==='contatos'}" @click="view='contatos'">
        <span class="nav-icon">👥</span> Contatos
      </div>
      <div class="nav-item" :class="{active:view==='registrar'}" @click="view='registrar'">
        <span class="nav-icon">✏️</span> Registrar Contato
      </div>
      <div class="nav-item" :class="{active:view==='historico'}" @click="view='historico'">
        <span class="nav-icon">📋</span> Histórico
      </div>
    </nav>
    <div class="sidebar-footer"><span class="sync-dot"></span>Sincronizado · {{ today }}</div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div class="topbar-title">{{ viewTitle }}</div>
      <div class="bp-tabs">
        <div v-for="bp in ['Todos','Gabi','Marina','Sara']" :key="bp"
             class="bp-tab" :class="{active:bpFiltro===bp}" @click="bpFiltro=bp">
          {{ bp }}
          <span v-if="bp!=='Todos' && alertasPorBP[bp]>0" class="bp-alerta">{{ alertasPorBP[bp] }}</span>
        </div>
      </div>
    </div>

    <div class="content">

      <!-- DASHBOARD -->
      <div v-if="view==='dashboard'">

        <!-- ── META MENSAL ── -->
        <div class="meta-box">
          <div class="meta-top">
            <div class="meta-left">
              <div class="meta-title">🎯 Meta de Contatos — {{ nomesMeses[mesAtual] }} {{ anoAtual }}</div>
              <div class="meta-subtitle">{{ bpFiltro==='Todos' ? 'Todas as BPs' : bpFiltro }}</div>
              <div class="meta-pct-wrap">
                <div class="meta-pct" :class="pctCor(metaMesAtual.pct)">{{ metaMesAtual.pct }}%</div>
                <div class="meta-pct-label">de alcance</div>
              </div>
              <div class="meta-bar">
                <div class="meta-bar-fill" :class="pctFill(metaMesAtual.pct)"
                     :style="{width:metaMesAtual.pct+'%'}"></div>
              </div>
              <div class="meta-counts">
                <b>{{ metaMesAtual.realizados }}</b> realizados de <b>{{ metaMesAtual.planejados }}</b> planejados
              </div>
            </div>
          </div>

          <!-- Breakdown por BP (só quando "Todos") -->
          <div v-if="bpFiltro==='Todos'" class="meta-bps">
            <div v-for="bp in ['Gabi','Marina','Sara']" :key="bp" class="meta-bp">
              <div class="meta-bp-name">{{ bp }}</div>
              <div class="meta-bp-pct" :class="pctCor(metaBP[bp].pct)">{{ metaBP[bp].pct }}%</div>
              <div class="meta-bp-bar">
                <div class="meta-bp-fill" :class="pctFill(metaBP[bp].pct)"
                     :style="{width:metaBP[bp].pct+'%'}"></div>
              </div>
              <div class="meta-bp-counts">{{ metaBP[bp].realizados }}/{{ metaBP[bp].planejados }} planejados</div>
            </div>
          </div>

          <!-- Histórico do semestre -->
          <div v-if="historicoMetas.length > 1" class="meta-hist">
            <div class="meta-hist-title">Histórico do Semestre</div>
            <div v-for="m in historicoMetas" :key="m.mes" class="meta-hist-row">
              <div class="meta-hist-mes">{{ m.nome }}</div>
              <div class="meta-hist-bar">
                <div class="meta-hist-fill" :class="pctFill(m.pct)"
                     :style="{width:m.pct+'%',height:'100%',borderRadius:'4px'}"></div>
              </div>
              <div class="meta-hist-pct" :class="pctCor(m.pct)">{{ m.pct }}%</div>
              <div class="meta-hist-cnt">{{ m.realizados }}/{{ m.planejados }}</div>
            </div>
          </div>
        </div>

        <!-- Cards status -->
        <div class="cards-row">
          <div class="card total"><div class="card-label">Total</div><div class="card-value">{{ stats.total }}</div><div class="card-sub">{{ bpFiltro==='Todos'?'todas as BPs':bpFiltro }}</div></div>
          <div class="card ok"><div class="card-label">Em Dia</div><div class="card-value">{{ stats.emDia }}</div><div class="card-sub">no prazo</div></div>
          <div class="card overdue"><div class="card-label">Vencidos</div><div class="card-value">{{ stats.vencido }}</div><div class="card-sub">prazo ultrapassado</div></div>
          <div class="card urgent"><div class="card-label">Urgente</div><div class="card-value">{{ stats.urgente }}</div><div class="card-sub">nunca contatados</div></div>
        </div>

        <!-- Progresso por unidade -->
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px">
          <div v-for="bp in ['Gabi','Marina','Sara']" :key="bp" class="card"
               v-show="bpFiltro==='Todos'||bpFiltro===bp">
            <div style="font-size:11px;font-weight:700;color:#888;text-transform:uppercase;margin-bottom:10px">{{ bp }}</div>
            <div v-for="un in unidadesPorBP[bp]" :key="un" style="margin-bottom:9px">
              <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px">
                <span :class="'badge u-'+uCls(un)">{{ un }}</span>
                <span class="count-info">{{ statsPorUnidade[un]?.emDia||0 }}/{{ statsPorUnidade[un]?.total||0 }}</span>
              </div>
              <div class="progress-bar"><div class="progress-fill" :class="pProgClass(statsPorUnidade[un])" :style="{width:pProgPct(statsPorUnidade[un])+'%'}"></div></div>
            </div>
          </div>
        </div>

        <!-- Alertas -->
        <div class="notif-panel" v-if="contatosAlerta.length">
          <div class="notif-panel-title">
            🔔 Contatos que precisam de atenção agora
            <span style="margin-left:auto;font-size:10px;color:#8888aa">{{ contatosAlerta.length }} pessoas</span>
          </div>
          <div v-for="c in contatosAlerta.slice(0,8)" :key="c.id" class="notif-item">
            <span v-if="c.risco" class="risco-dot"></span>
            <span class="notif-item-nome">{{ c.nome }}</span>
            <span :class="'badge u-'+uCls(c.unidade)" style="margin:0 4px">{{ c.unidade }}</span>
            <span class="badge bp-badge">{{ c.bp }}</span>
            <span :class="'notif-item-days '+(c.status==='URGENTE'?'days-urgente':'days-vencido')" style="margin:0 6px">
              {{ c.status==='URGENTE'?'Sem contato':diasAtraso(c)+'d atraso' }}
            </span>
            <button class="btn btn-primary btn-sm" @click="abrirRegistro(c)">+ Registrar</button>
          </div>
          <div v-if="contatosAlerta.length>8" style="font-size:10px;color:#8888aa;text-align:center;margin-top:6px">
            + {{ contatosAlerta.length-8 }} outros — veja em Contatos
          </div>
        </div>

        <div class="section-card">
          <div class="section-header">
            <div class="section-title">⚠️ Urgentes e Vencidos</div>
            <span class="count-info">{{ contatosAlerta.length }} contatos</span>
          </div>
          <div class="table-wrap">
            <table v-if="contatosAlerta.length">
              <thead><tr><th>Nome</th><th>Unidade</th><th>BP</th><th>Cargo</th><th>Último Contato</th><th>Atraso</th><th>Status</th><th></th></tr></thead>
              <tbody>
                <tr v-for="c in contatosAlerta" :key="c.id">
                  <td><div class="nome-cell"><span v-if="c.risco" class="risco-dot"></span>{{ c.nome }}</div></td>
                  <td><span :class="'badge u-'+uCls(c.unidade)">{{ c.unidade }}</span></td>
                  <td><span class="badge bp-badge">{{ c.bp }}</span></td>
                  <td :class="cargoCls(c.cargo)">{{ c.cargo||'—' }}</td>
                  <td>{{ c.ultimoContato?fmtDate(c.ultimoContato):'—' }}</td>
                  <td style="color:#c0392b;font-weight:700;font-size:11px">{{ c.status==='URGENTE'?'Sem contato':diasAtraso(c)+'d' }}</td>
                  <td><span :class="'status-badge s-'+c.status.toLowerCase()">{{ c.status }}</span></td>
                  <td><button class="btn btn-primary btn-sm" @click="abrirRegistro(c)">Registrar</button></td>
                </tr>
              </tbody>
            </table>
            <div v-else class="empty">Todos em dia! 🎉</div>
          </div>
        </div>
      </div>

      <!-- CONTATOS -->
      <div v-if="view==='contatos'">
        <div class="section-card">

function calcMetaMes(contatos, historico, mes, ano){
  // Jan, Fev, Mar de 2026: líderes/gestores (mensal) + 1/3 assessores, tudo 100% realizado
  if(ano===2026 && mes<=3){
    const gestores = contatos.filter(c=>c.cargo==='Gestor de Unidade'||c.cargo==='Líder de Equipe').length;
    const assessores = contatos.filter(c=>c.cargo!=='Gestor de Unidade'&&c.cargo!=='Líder de Equipe').length;
    const planejados = gestores + Math.ceil(assessores/3);
    return{planejados, realizados:planejados, pct:100};
  }
  const inicioMes = new Date(ano, mes-1, 1);
  const fimMes   = new Date(ano, mes, 0, 23, 59, 59);
  let planejados=0, realizados=0;
  for(const c of contatos){
    const hists = historico.filter(h=>h.contatoId===c.id).sort((a,b)=>a.data.localeCompare(b.data));
    const noMes  = hists.filter(h=>{ const d=new Date(h.data); return d>=inicioMes&&d<=fimMes; });
    const antes  = hists.filter(h=>new Date(h.data)<inicioMes);
    let planejado=false;
    if(c.cargo==='Gestor de Unidade'||c.cargo==='Líder de Equipe'){
      planejado=true;
    } else {
      if(antes.length===0){
        planejado=true;
      } else {
        const ultimo=antes[antes.length-1];
        const prox=new Date(ultimo.data);
        prox.setDate(prox.getDate()+90);
        planejado=prox<=fimMes;
      }
    }
    if(planejado){ planejados++; if(noMes.length>0) realizados++; }
  }
  const pct=planejados>0?Math.round(realizados/planejados*100):0;
  return{planejados,realizados,pct};
}

createApp({
  data(){
    const d=new Date();
    return{
      loading:true, salvando:false,
      view:'dashboard', bpFiltro:'Todos',
      contatos:[], historico:[],
      filtroUnidade:'',filtroCargo:'',filtroStatus:'',busca:'',
      histBusca:'',histFiltroUnidade:'',histFiltroMes:'',
      modalContato:null, registroSucesso:false,
      anoAtual:d.getFullYear(),
      hoje:d.toISOString().split('T')[0],
      form:{contatoId:'',data:'',canal:'',tipo:'',status2:'',risco:false,planoAcao:false,comentarios:''},
      unidadesPorBP:{Gabi:['BHZ','RJO','BRU'],Marina:['SP','BSB','GYN'],Sara:['VIX','NEX','LIN','CAC']}
    };
  },
  async mounted(){
    const snap=await db.ref('contatos').once('value');
    if(!snap.val()){
      const co={};CONTATOS_INICIAIS.forEach(c=>co[c.id]=c);
      const ho={};HISTORICO_INICIAL.forEach(h=>ho[h.id]=h);
      await db.ref('contatos').set(co);
      await db.ref('historico').set(ho);
    } else {
      // Migrar siglas antigas -> novas (NExus->NEX, Linhares->LIN, Cachoeiro->CAC)
      const renomeMap={'NExus':'NEX','Linhares':'LIN','Cachoeiro':'CAC'};
      const cObj=snap.val();
      const updates={};
      for(const id in cObj){
        const u=cObj[id].unidade;
        if(renomeMap[u]) updates['contatos/'+id+'/unidade']=renomeMap[u];
      }
      // Remover contatos descontinuados (por nome, case-insensitive)
      const removerNomes=['GESSICA DA SILVA SOARES','VITOR PEREIRA CAPELI','VIRGILIO ALVES LOURENCO LAGE','STEFAN SARKIS WOELFFEL FURTADO','VINICIUS SALDANHA SOARES PINTO','ROBERTO BALARINI JUNIOR','ROBERTO UILLIAN DA SILVA','MARCO ANTONIO SOLANO SALMASO','LUIZ GUILHERME BELTRAO BARCIK','EUSTAQUIO MAFRA','BRUNO THOMAZ LOTT','CAMILA BARBOSA DE SOUZA GARCIA','ADRIANO MORANDI RONDELI','MARCUS ARAUJO ALVES DOS SANTOS','FLAVIO GONCALVES MACIEL DE FIGUEIREDO','FELIPE PINHEIRO SATHLER','KONRAD CAMPOS SALOMAO','DANIEL BASILIO GIESTAS','ARTHUR MASSUCATTI RONDELI','MYRNA SILVEIRA DE SOUZA VASCONCELOS','BRUNO MANSUR DE MELLO GONCALVES'].map(n=>n.toUpperCase());
      for(const id in cObj){
        const nm=(cObj[id].nome||'').toUpperCase();
        if(removerNomes.includes(nm)) updates['contatos/'+id]=null;
      }
      // Garantir que VITOR AUGUSTO MADEIRA GOMES exista
      const temVitor=Object.values(cObj).some(c=>(c.nome||'').toUpperCase()==='VITOR AUGUSTO MADEIRA GOMES');
      if(!temVitor) updates['contatos/c030']={id:'c030',nome:'VITOR AUGUSTO MADEIRA GOMES',unidade:'BHZ',cargo:'Assessor',bp:'Gabi',risco:false};
      if(Object.keys(updates).length>0) await db.ref().update(updates);
    }
    db.ref('contatos').on('value',snap=>{const v=snap.val();this.contatos=v?Object.values(v):[];});
    db.ref('historico').on('value',snap=>{const v=snap.val();this.historico=v?Object.values(v):[];this.loading=false;});
  },
  computed:{
    today(){ return new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'}); },
    mesAtual(){ return new Date().getMonth()+1; },
    nomesMeses(){ return['','Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro']; },
    viewTitle(){ return{dashboard:'Dashboard',contatos:'Contatos',registrar:'Registrar Contato',historico:'Histórico de Interações'}[this.view]; },
    todasUnidades(){
      const m={Gabi:['BHZ','RJO','BRU'],Marina:['SP','BSB','GYN'],Sara:['VIX','NEX','LIN','CAC']};
      return this.bpFiltro!=='Todos'?(m[this.bpFiltro]||[]):['BHZ','RJO','BRU','SP','BSB','GYN','VIX','NEX','LIN','CAC'];
    },
    unidadesFiltradas(){ return this.todasUnidades; },
    contatosComStatus(){
      const hoje=this.hoje,sem=new Date().getMonth()<6?1:2,ano=new Date().getFullYear();
      return this.contatos.map(c=>{
        const hists=[...this.historico].filter(h=>h.contatoId===c.id).sort((a,b)=>b.data.localeCompare(a.data));
        const ultimo=hists[0]?.data||null;
        const meta=metaPorCargo(c.cargo),inter=intervaloDias(c.cargo);
        const qtdSem=hists.filter(h=>getSemestre(h.data)===sem&&getAno(h.data)===ano).length;
        let prox=null,status='URGENTE';
        if(ultimo){const d=new Date(ultimo);d.setDate(d.getDate()+inter);prox=d.toISOString().split('T')[0];status=prox>=hoje?'EM DIA':'VENCIDO';}
        return{...c,ultimoContato:ultimo,proximoContato:prox,status,metaSem:meta,qtdSem,progressoSem:meta?qtdSem/meta:0};
      });
    },
    contatosFiltradosPorBP(){ return this.bpFiltro==='Todos'?this.contatosComStatus:this.contatosComStatus.filter(c=>c.bp===this.bpFiltro); },
    contatosFiltrados(){
      return this.contatosFiltradosPorBP.filter(c=>{
        if(this.filtroUnidade&&c.unidade!==this.filtroUnidade)return false;
        if(this.filtroCargo&&c.cargo!==this.filtroCargo)return false;
        if(this.filtroStatus&&c.status!==this.filtroStatus)return false;
        if(this.busca&&!c.nome.toLowerCase().includes(this.busca.toLowerCase()))return false;
        return true;
      });
    },
    contatosAlerta(){ return this.contatosFiltradosPorBP.filter(c=>c.status==='URGENTE'||c.status==='VENCIDO').sort((a,b)=>({URGENTE:0,VENCIDO:1}[a.status]??9)-({URGENTE:0,VENCIDO:1}[b.status]??9)); },
    totalAlerta(){ return this.contatosAlerta.length; },
    alertasPorBP(){
      const res={};
      ['Gabi','Marina','Sara'].forEach(bp=>{ res[bp]=this.contatosComStatus.filter(c=>c.bp===bp&&(c.status==='URGENTE'||c.status==='VENCIDO')).length; });
      return res;
    },
    stats(){ const cs=this.contatosFiltradosPorBP; return{total:cs.length,emDia:cs.filter(c=>c.status==='EM DIA').length,vencido:cs.filter(c=>c.status==='VENCIDO').length,urgente:cs.filter(c=>c.status==='URGENTE').length}; },
    statsPorUnidade(){
      const res={};
      this.contatosComStatus.forEach(c=>{ if(!res[c.unidade])res[c.unidade]={total:0,emDia:0}; res[c.unidade].total++; if(c.status==='EM DIA')res[c.unidade].emDia++; });
      return res;
    },
    metaMesAtual(){ return calcMetaMes(this.contatosFiltradosPorBP,this.historico,this.mesAtual,this.anoAtual); },
    metaBP(){
      const res={};
      ['Gabi','Marina','Sara'].forEach(bp=>{ const cs=this.contatosComStatus.filter(c=>c.bp===bp); res[bp]=calcMetaMes(cs,this.historico,this.mesAtual,this.anoAtual); });
      return res;
    },
    historicoMetas(){
      const meses=[];
      for(let m=1;m<=this.mesAtual;m++){
        const r=calcMetaMes(this.contatosFiltradosPorBP,this.historico,m,this.anoAtual);
        meses.push({mes:m,nome:this.nomesMeses[m],...r});
      }
      return meses.reverse();
    },
    historicoFiltrado(){
      return[...this.historico].filter(h=>{
        const c=this.contatos.find(x=>x.id===h.contatoId);
        if(!c)return false;
        if(this.bpFiltro!=='Todos'&&c.bp!==this.bpFiltro)return false;
        if(this.histFiltroUnidade&&c.unidade!==this.histFiltroUnidade)return false;
        if(this.histBusca&&!c.nome.toLowerCase().includes(this.histBusca.toLowerCase()))return false;
        if(this.histFiltroMes&&h.data.slice(5,7)!==this.histFiltroMes)return false;
        return true;
      }).sort((a,b)=>b.data.localeCompare(a.data));
    },
  },
  methods:{
    fmtDate(d){if(!d)return'—';const[y,m,day]=d.split('-');return`${day}/${m}/${y}`;},
    uCls(u){return(u||'').toLowerCase().replace(/\s/g,'');},
    cargoCls(c){if(!c)return'';if(c.includes('Gestor'))return'cargo-gestor';if(c.includes('Líder'))return'cargo-lider';return'cargo-assessor';},
    pctCor(p){return p>=80?'c-ok':p>=50?'c-med':'c-low';},
    pctFill(p){return p>=80?'f-ok':p>=50?'f-med':'f-low';},
    pProgPct(s){return(!s||!s.total)?0:Math.round(s.emDia/s.total*100);},
    pProgClass(s){const p=this.pProgPct(s);return p<50?'danger':p<80?'warn':'';},
    diasAtraso(c){if(!c.proximoContato)return 0;return Math.max(0,Math.floor((new Date(this.hoje)-new Date(c.proximoContato))/86400000));},
    nomeC(id){return this.contatos.find(c=>c.id===id)?.nome||'';},
    unidadeC(id){return this.contatos.find(c=>c.id===id)?.unidade||'';},
    cargoC(id){return this.contatos.find(c=>c.id===id)?.cargo||'';},
    bpC(id){return this.contatos.find(c=>c.id===id)?.bp||'';},
    histDoContato(id){return[...this.historico].filter(h=>h.contatoId===id).sort((a,b)=>b.data.localeCompare(a.data));},
    contatosPorUnidade(un){return this.contatosFiltradosPorBP.filter(c=>c.unidade===un);},
    abrirRegistro(c){this.form.contatoId=c.id;this.form.data=this.hoje;this.view='registrar';},
    abrirRegistroModal(c){this.modalContato=null;this.abrirRegistro(c);},
    verHistorico(c){this.modalContato=this.contatosComStatus.find(x=>x.id===c.id);},
    async salvarContato(){
      if(!this.form.contatoId||!this.form.data)return;
      this.salvando=true;
      const id='h'+Date.now();
      await db.ref('historico/'+id).set({id,...this.form});
      if(this.form.risco) await db.ref('contatos/'+this.form.contatoId+'/risco').set(true);
      this.salvando=false;this.registroSucesso=true;
      setTimeout(()=>this.registroSucesso=false,3000);
      this.limparForm();
    },
    limparForm(){this.form={contatoId:'',data:this.hoje,canal:'',tipo:'',status2:'',risco:false,planoAcao:false,comentarios:''};},
  }
}).mount('#app');
</script>
